name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

# Prerequisite: each npm package must have this workflow configured as a
# trusted publisher on npmjs.com (package → Settings → Trusted Publishers).
# Packages are submitted to npm staging here; run `npm stage approve <id>`
# with 2FA to make them live.

jobs:
  release:
    name: Build, Stage & Release
    runs-on: macos-latest
    permissions:
      contents: write
      id-token: write # for OIDC trusted publishing + provenance
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
          submodules: true

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          package-manager-cache: false
          registry-url: https://registry.npmjs.org

      - name: Upgrade npm (staged publishing requires npm ≥ 11.15.0, Node ≥ 22.14.0)
        run: npm install -g npm@latest

      - run: npm ci

      - name: Import signing certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          KEYCHAIN_PASSWORD=$(openssl rand -hex 16)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "$CERTIFICATE_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" \
            -k "$KEYCHAIN_PATH" \
            -P "$CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Build
        env:
          SIGN_IDENTITY: ${{ secrets.APPLE_SIGN_IDENTITY }}
        run: npm run build --workspaces --if-present

      - name: Pack npm tarballs
        run: npm pack --workspaces

      - name: Stage to npm
        run: |
          for tarball in ./*.tgz; do
            npm stage publish "$tarball" --access public --provenance
          done

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes

      - name: Cleanup keychain
        if: always()
        run: security delete-keychain "$RUNNER_TEMP/build.keychain" || true
